services:
  autofix:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false   # real mode loads it; demo mode runs without it
    environment:
      DB_PATH: /data/autofix.db
    volumes:
      - ./data:/data
    restart: unless-stopped

  # Live GitHub webhook delivery for `issues` events -> POST /webhook/github.
  # Opt-in: `docker compose --profile webhook up`. Set NGROK_AUTHTOKEN in .env,
  # read the public URL from http://localhost:4040, and register a GitHub webhook
  # (Settings > Webhooks: issues events, secret = GITHUB_WEBHOOK_SECRET) pointing
  # at <public-url>/webhook/github.
  ngrok:
    image: ngrok/ngrok:latest
    profiles: ["webhook"]
    command: http autofix:8000 --log stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"
    depends_on:
      - autofix
